services:
  api:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      SQLITE_PATH: /data/db.sqlite3
    volumes:
      - gdg_sqlite:/data
    networks:
      - gdg

  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    depends_on:
      - api
    env_file:
      - .env
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - gdg

volumes:
  gdg_sqlite:
  caddy_data:
  caddy_config:

networks:
  gdg:
