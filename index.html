<!doctype html>
<html lang="zh-CN">
  <head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-BJTPZCTL9T"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-BJTPZCTL9T');

    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>鹅鸭饭局鉴定局</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="game" aria-labelledby="game-title">
        <div class="topbar">
          <div class="topbar-title">
            <p class="kicker">Goose Duck Goose</p>
            <h1 id="game-title">鹅鸭饭局鉴定局</h1>
          </div>
          <div class="topbar-actions">
            <div class="scoreboard" aria-live="polite">
              <span id="roundLabel">第 1 / 8 题</span>
              <strong id="scoreLabel">0 分</strong>
            </div>
          </div>
        </div>

        <div class="meter" aria-hidden="true">
          <span id="progressBar"></span>
        </div>

        <article class="question-panel">
          <div class="photo-frame">
            <img id="dishImage" alt="" referrerpolicy="no-referrer">
            <div class="image-status" id="imageStatus">正在上菜...</div>
          </div>

          <div class="question-copy">
            <p class="round-note" id="roundNote">看图开猜</p>
            <h2 id="dishTitle">这碗饭局，主角是谁？</h2>
            <p id="dishHint">凭颜色、切法、配菜和直觉判断：这是鹅，还是鸭？</p>

            <div class="choice-grid" id="choiceGrid">
              <button class="choice choice-goose" type="button" data-answer="goose">
                <span>鹅</span>
                <small>更像鹅肉</small>
              </button>
              <button class="choice choice-duck" type="button" data-answer="duck">
                <span>鸭</span>
                <small>更像鸭肉</small>
              </button>
            </div>

            <div class="feedback" id="feedback" hidden>
              <strong id="feedbackTitle"></strong>
              <p id="feedbackText"></p>
              <a id="sourceLink" href="#" target="_blank" rel="noreferrer">查看照片来源</a>
            </div>

            <button class="next-button" id="nextButton" type="button" hidden>下一题</button>
          </div>
        </article>
      </section>

      <section class="result-panel" id="resultPanel" hidden aria-live="polite">
        <div class="share-card" id="shareCard">
          <p class="kicker">本局鉴定</p>
          <h2 id="resultTitle">你的饭局鉴定报告</h2>
          <p id="resultText"></p>

          <div class="share-link">
            <span>小游戏 URL</span>
            <a id="shareUrl" href="#" target="_blank" rel="noreferrer"></a>
          </div>

          <div class="share-qr" id="shareQrBlock">
            <canvas id="shareQrCanvas" width="148" height="148" aria-label="小游戏二维码"></canvas>
            <p id="shareQrHint">扫码来玩</p>
          </div>

          <div class="share-stats">
            <div>
              <span>得分</span>
              <strong id="shareScore">0/0</strong>
            </div>
            <div>
              <span>正确率</span>
              <strong id="accuracyLabel">0%</strong>
            </div>
            <div>
              <span>题数</span>
              <strong id="totalLabel">0</strong>
            </div>
          </div>

          <div class="mini-review" id="miniReview" aria-label="答题缩略复盘"></div>
        </div>

        <div class="result-actions">
          <button id="toggleQrButton" type="button">隐藏二维码</button>
          <button id="restartButton" type="button">再来一局</button>
        </div>
        <div class="review-list" id="reviewList"></div>
      </section>
    </main>

    <footer class="site-footer" aria-label="站点链接">
      <a class="site-footer-link github-link" href="https://github.com/libreliu" target="_blank" rel="noreferrer" aria-label="GitHub @libreliu">
        <svg class="github-mark" viewBox="0 0 16 16" aria-hidden="true">

        </svg>
        <span>@libreliu</span>
      </a>
      <a class="site-footer-link" id="sourceButton" href="#source">
        图片来源
      </a>
    </footer>

    <div class="source-modal" id="sourceModal" hidden>
      <div class="source-dialog" role="dialog" aria-modal="true" aria-labelledby="sourceDialogTitle">
        <div class="source-dialog-head">
          <div>
            <p class="kicker">Image Credits</p>
            <h2 id="sourceDialogTitle">图片来源</h2>
          </div>
          <button class="source-close" id="sourceCloseButton" type="button" aria-label="关闭图片来源">×</button>
        </div>
        <div class="source-list" id="sourceList"></div>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
