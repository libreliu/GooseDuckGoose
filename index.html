<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>鹅鸭饭局鉴定局</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="game" aria-labelledby="game-title">
        <div class="topbar">
          <div>
            <p class="kicker">Goose Duck Goose</p>
            <h1 id="game-title">鹅鸭饭局鉴定局</h1>
          </div>
          <div class="topbar-actions">
            <a class="contribute-link" href="https://github.com/libreliu/GooseDuckGoose/pulls" target="_blank" rel="noreferrer">
              贡献新题目
            </a>
            <div class="scoreboard" aria-live="polite">
              <span id="roundLabel">第 1 / 8 题</span>
              <strong id="scoreLabel">0 分</strong>
            </div>
          </div>
        </div>

        <div class="meter" aria-hidden="true">
          <span id="progressBar"></span>
        </div>

        <article class="question-panel">
          <div class="photo-frame">
            <img id="dishImage" alt="" referrerpolicy="no-referrer">
            <div class="image-status" id="imageStatus">正在上菜...</div>
          </div>

          <div class="question-copy">
            <p class="round-note" id="roundNote">看图开猜</p>
            <h2 id="dishTitle">这碗饭局，主角是谁？</h2>
            <p id="dishHint">凭颜色、切法、配菜和直觉判断：这是鹅，还是鸭？</p>

            <div class="choice-grid" id="choiceGrid">
              <button class="choice choice-goose" type="button" data-answer="goose">
                <span>鹅</span>
                <small>更像鹅肉</small>
              </button>
              <button class="choice choice-duck" type="button" data-answer="duck">
                <span>鸭</span>
                <small>更像鸭肉</small>
              </button>
            </div>

            <div class="feedback" id="feedback" hidden>
              <strong id="feedbackTitle"></strong>
              <p id="feedbackText"></p>
              <a id="sourceLink" href="#" target="_blank" rel="noreferrer">查看照片来源</a>
            </div>

            <button class="next-button" id="nextButton" type="button" hidden>下一题</button>
          </div>
        </article>
      </section>

      <section class="result-panel" id="resultPanel" hidden aria-live="polite">
        <div class="share-card" id="shareCard">
          <p class="kicker">可截图分享</p>
          <h2 id="resultTitle">你的饭局鉴定报告</h2>
          <p id="resultText"></p>

          <div class="share-stats">
            <div>
              <span>得分</span>
              <strong id="shareScore">0/0</strong>
            </div>
            <div>
              <span>打败</span>
              <strong id="beatenCount">计算中</strong>
            </div>
            <div>
              <span>排行</span>
              <strong id="rankLabel">--</strong>
            </div>
          </div>

          <div class="distribution" aria-label="分数分布" id="distributionChart"></div>
          <div class="mini-review" id="miniReview" aria-label="答题缩略复盘"></div>
        </div>

        <div class="result-actions">
          <button id="restartButton" type="button">再来一局</button>
        </div>
        <div class="review-list" id="reviewList"></div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
